name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. チェックアウト
      - uses: actions/checkout@v4

      # 2. Node.js セットアップ
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # 3. .env.local を復元（ビルド時にNEXT_PUBLIC_* が必要）
      - name: Create .env.local
        run: printf '%s\n' "$ENV_FILE" > .env.local
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}

      # 4. 依存関係インストール ＆ ビルド
      - name: Install & Build
        run: |
          npm ci
          npm run build

      # 5. SSH鍵をセットアップ
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # 6. ビルド成果物をVPSへ転送
      - name: Deploy to VPS
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          TARGET="tsukada@${{ secrets.VPS_HOST }}:/var/www/prisma"

          # standalone ビルド成果物を転送
          # --delete で古いファイルを除去しつつ、手動配置ファイルは保護
          rsync -avz --delete \
            --exclude 'google-key/' \
            --exclude '.env.local' \
            --exclude 'public/' \
            -e "$SSH" \
            .next/standalone/ \
            "$TARGET/"

          # 静的ファイルを転送
          rsync -avz --delete \
            -e "$SSH" \
            .next/static/ \
            "$TARGET/.next/static/"

          # public ディレクトリを転送
          rsync -avz \
            -e "$SSH" \
            public/ \
            "$TARGET/public/"

          # .env.local を転送（Secretsから復元したもの）
          rsync -avz \
            -e "$SSH" \
            .env.local \
            "$TARGET/.env.local"

      # 7. サービスを再起動
      - name: Restart service
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no tsukada@${{ secrets.VPS_HOST }} '
            sudo systemctl restart aqsh-prisma
            sleep 3
            if sudo systemctl is-active --quiet aqsh-prisma; then
              echo "✅ Service restarted successfully"
            else
              echo "❌ Service failed to start"
              sudo journalctl -u aqsh-prisma --no-pager -n 20
              exit 1
            fi
          '
