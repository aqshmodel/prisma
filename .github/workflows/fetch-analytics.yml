name: Fetch SEO Analytics Data

on:
  schedule:
    # 毎週月曜日の UTC 0:00 (日本時間の 月曜 9:00) に自動実行
    - cron: '0 0 * * 1'
  workflow_dispatch: # GitHubの画面から手動ボタンで実行したい時のため

jobs:
  fetch-analytics:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 変更をリポジトリにpushするための権限

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # プッシュするためにTokenが必要
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}'
          create_credentials_file: true
          # このActionが自動で生成したJSONファイルのパスを、以後のステップ向けに出力します

      - name: Fetch Analytics Data
        env:
          # google-github-actions/auth が自動生成したファイルのパスを使用する
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
        run: python scripts/fetch_analytics_data.py

      - name: Commit and Push changes
        # 取得した出力ファイル(documents/analytics配下)をGit commitしてPushする
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add documents/analytics/
          # 変更がある場合のみコミットする
          git diff --staged --quiet || git commit -m "docs(analytics): Auto-fetch SEO analytics data [skip ci]"
          git push origin HEAD
